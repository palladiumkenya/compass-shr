# -------------------------------------------------------------------------------------
# Server & Spring Boot
# -------------------------------------------------------------------------------------
server:
  port: 8080
  tomcat:
    # allow | as a separator in URLs
    relaxed-query-chars: "|"

management:
  # Actuator endpoints: only /actuator/health exposed by default
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include: "health"  # or "info,health,prometheus,metrics" or "*" for all
  endpoint:
    info:
      enabled: true
    metrics:
      enabled: true
    health:
      enabled: true
      probes:
        enabled: true
      group:
        liveness:
          include: [ "livenessState", "readinessState" ]
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

spring:
  application:
    name: "@project.artifactId@"
  ai:
    mcp:
      server:
        name: FHIR MCP Server
        version: 1.0.0
        instructions: "This server provides access to a FHIR RESTful API. You can use it to query FHIR resources, perform operations, and retrieve data in a structured format."
        enabled: true
        streamable-http:
          mcp-endpoint: /mcp/messages


  # -------------------------------------------------------------------------------
  # B. Core Spring
  # -------------------------------------------------------------------------------
  main:
    allow-bean-definition-overriding: false
    allow-circular-references: true
    banner-mode: off

  autoconfigure:
    # This exclude is only needed for setups not using Elasticsearch where the elasticsearch sniff is not needed.
    exclude: org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration

  flyway:
    enabled: false
    baseline-on-migrate: true
    fail-on-missing-locations: false

  datasource:
    url: 'jdbc:postgresql://db:5432/hapi'
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driverClassName: org.postgresql.Driver
    # max-active: 15     # (ignored with HikariCP; use hikari.maximum-pool-size)
    hikari:
      maximum-pool-size: 10

  jpa:
    properties:
      hibernate:
        format_sql: false
        show_sql: false
        dialect: ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect
        hbm2ddl:
          auto: update
        jdbc:
          batch_size: 20
        cache:
          use_query_cache: false
          use_second_level_cache: false
          use_structured_entries: false
          use_minimal_puts: false
        search:
          enabled: false

hapi:
  fhir:
    auth:
      # Must be at least 32 characters. Required: set HAPI_FHIR_AUTH_JWT_SECRET env var.
      jwt-secret: ${HAPI_FHIR_AUTH_JWT_SECRET}

    # -------------------------------------------------------------------------------
    # A. Core Server & API
    # -------------------------------------------------------------------------------
    openapi_enabled: true                       # Swagger UI at /fhir/swagger-ui/index.html; API docs at /fhir/api-docs
    fhir_version: R4                            # DSTU2 | DSTU3 | R4 | R5
    ig_runtime_upload_enabled: false
    client_id_strategy: ANY                     # allow purely numeric client-assigned IDs (e.g. MFL codes)
    enforce_referential_integrity_on_write: false  # allow references to non-existent resources (e.g. Patient)

    cr:
      enabled: false                            # exposes Clinical Reasoning operation endpoints
      caregaps:
        reporter: "default"
        section_author: "default"
      terminologyServerClientSettings:
        maxRetryCount: 3
        retryIntervalMillis: 1000
        timeoutSeconds: 30
        socketTimeout: 60
      cql:
        use_embedded_libraries: true
        # namespaces:                             # namespaces to be registered with the CQL engine
          # example
          # hl7.fhir.uv.cql: http://hl7.org/fhir/uv/cql
        compiler:
          error_level: Info
          signature_level: All
          enable_annotations: true
          enable_locators: true
          enable_results_type: true
          enable_detailed_errors: true

        runtime:
          debug_logging_enabled: false
        terminology:
          valueset_preexpansion_mode: USE_IF_PRESENT         # USE_IF_PRESENT | REQUIRE | IGNORE
          valueset_expansion_mode: PERFORM_NAIVE_EXPANSION   # AUTO | USE_EXPANSION_OPERATION | PERFORM_NAIVE_EXPANSION
          valueset_membership_mode: USE_EXPANSION            # AUTO | USE_VALIDATE_CODE_OPERATION | USE_EXPANSION
          code_lookup_mode: USE_VALIDATE_CODE_OPERATION      # AUTO | USE_VALIDATE_CODE_OPERATION | USE_CODESYSTEM_URL
        data:
          search_parameter_mode: USE_SEARCH_PARAMETERS       # AUTO | USE_SEARCH_PARAMETERS | FILTER_IN_MEMORY
          terminology_parameter_mode: FILTER_IN_MEMORY       # AUTO | USE_VALUE_SET_URL | USE_INLINE_CODES | FILTER_IN_MEMORY
          profile_mode: DECLARED                             # ENFORCED | DECLARED | OPTIONAL | TRUST | OFF
    cdshooks:
      enabled: false
      clientIdHeaderName: client_id
    bulk_export_enabled: false
    bulk_import_enabled: false
    default_search_params_canonical_form: false
    bulk_export_file_retention_period_hours: 2
    narrative_enabled: false
    mdm_enabled: false
    mdm_rules_json_location: "mdm-rules.json"
    logical_urls:
      - http://terminology.hl7.org/*
      - https://terminology.hl7.org/*
      - http://snomed.info/*
      - https://snomed.info/*
      - http://unitsofmeasure.org/*
      - https://unitsofmeasure.org/*
      - http://loinc.org/*
      - https://loinc.org/*
    cors:
      # allow_Credentials: false
      allowed_origin:
        - "*"
    search-coord-core-pool-size: 20
    search-coord-max-pool-size: 100
    search-coord-queue-capacity: 200
    search_prefetch_thresholds: 13,503,2003,-1
    custom-interceptor-classes: ca.uhn.fhir.jpa.starter.auth.CustomAuthorizationInterceptor
    binary_storage_minimum_binary_size: 4000

    tester:
      home:
        name: Local Tester
        server_address: 'http://localhost:8080/fhir'
        refuse_to_fetch_third_party_urls: false
        fhir_version: R4
