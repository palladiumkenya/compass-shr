events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        # Docker's internal DNS — required when proxy_pass URIs contain variables
        resolver 127.0.0.11 valid=30s ipv6=off;

        # Auth service — pass full URI through unchanged
        location /v1/hie-auth {
            proxy_pass http://compass-auth:7777;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # FHIR submission — only ServiceRequest is allowed
        location = /v1/shr-submission {
            if ($arg_resource != "ServiceRequest") {
                return 403;
            }
            set $fhir_upstream http://fhir:8080;
            proxy_pass $fhir_upstream/fhir/ServiceRequest;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # FHIR referrals — fetch ServiceRequests by performing organization
        location = /v1/shr-referrals {
            if ($request_method != GET) {
                return 405;
            }
            if ($arg_facility_code = "") {
                return 400;
            }
            set $fhir_upstream http://fhir:8080;
            proxy_pass $fhir_upstream/fhir/ServiceRequest?performer=Organization/$arg_facility_code&$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Deny everything else
        location / {
            return 403;
        }
    }
}
